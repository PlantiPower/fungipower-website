<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FungiPower Flyer</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a0e08;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      font-family: 'Outfit', sans-serif;
    }

    .flyer {
      width: 794px;
      min-height: 1123px;
      background: radial-gradient(ellipse at 60% 30%, #7a2d0a 0%, #3d1505 35%, #1a0a03 70%, #0d0601 100%);
      padding: 40px 44px 36px 44px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 36px;
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1.0;
      font-family: 'Outfit', sans-serif;
    }
    .logo span { display: block; }
    .logo .fp-power { margin-left: 4px; }

    .badge {
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 16px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    /* HEADLINE */
    .headline {
      margin-bottom: 20px;
    }
    .headline h1 {
      font-size: 88px;
      font-weight: 900;
      line-height: 0.92;
      text-transform: uppercase;
      letter-spacing: -2px;
    }
    .headline h1 .white { color: #ffffff; }
    .headline h1 .orange { color: #f97316; }

    /* SUBTITLE */
    .subtitle {
      font-size: 18px;
      color: #ffffff;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .subtitle strong { font-weight: 900; }

    /* PRODUCTS */
    .products {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 48px;
      flex: 1;
      padding: 32px 0 16px 0;
    }

    .product-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .product-img {
      height: 280px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
    }

    /* LABELS */
    .product-labels {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-bottom: 24px;
    }
    .product-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot-orange { background: #f97316; }
    .dot-blue { background: #60a5fa; }

    /* STATS */
    .stats {
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      margin-bottom: 28px;
    }
    .stat {
      flex: 1;
      padding: 20px 16px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.15);
    }
    .stat:last-child { border-right: none; }
    .stat-number {
      font-size: 36px;
      font-weight: 900;
      color: #f97316;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      line-height: 1.4;
    }

    /* FOOTER */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-left {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
    }
    .footer-right {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
    }

    @media print {
      body { padding: 0; background: none; }
      .flyer { width: 210mm; min-height: 297mm; }
    }
  </style>
</head>
<body>
  <div class="flyer">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="logo">
        <span>Fungi</span>
        <span class="fp-power">Power</span>
      </div>
      <div class="badge">Nutriënten Transporteur</div>
    </div>

    <!-- HEADLINE -->
    <div class="headline">
      <h1>
        <span class="white">Meer opname.</span><br/>
        <span class="orange">Hogere<br/>opbrengst.</span>
      </h1>
    </div>

    <!-- SUBTITLE -->
    <div class="subtitle">
      <strong>Start</strong> op dag 1 voor de kolonisatie.<br/>
      <strong>Boost</strong> na elke vlucht voor maximale opbrengst.
    </div>

    <!-- PRODUCTS -->
    <div class="products">
      <div class="product-wrap">
        <img class="product-img" src="/images/products/fungipower-start.png" alt="FungiPower Start" />
      </div>
      <div class="product-wrap">
        <img class="product-img" src="/images/products/fungipower-boost.svg" alt="FungiPower Boost" />
      </div>
    </div>

    <!-- LABELS -->
    <div class="product-labels">
      <div class="product-label"><span class="dot dot-orange"></span> Start</div>
      <div class="product-label"><span class="dot dot-blue"></span> Boost</div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat">
        <div class="stat-number">+14%</div>
        <div class="stat-label">Opbrengst<br/>per m²</div>
      </div>
      <div class="stat">
        <div class="stat-number">20</div>
        <div class="stat-label">Praktijk-<br/>proeven</div>
      </div>
      <div class="stat">
        <div class="stat-number">100%</div>
        <div class="stat-label">Natuur-<br/>lijk</div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-left">fungipower.bio · Venlo, NL</div>
      <div class="footer-right">Start · Boost · 10L &amp; 1000L</div>
    </div>

  </div>
</body>
</html>
